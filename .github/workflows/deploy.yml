name: Deploy docs + demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ui-theme/target
            web-demo/target
            ui-storybook/target
          key: wasm-${{ hashFiles('web-demo/Cargo.lock', 'ui-storybook/Cargo.lock', 'ui-theme/Cargo.toml') }}
          restore-keys: wasm-

      # 1. Generate CSS tokens from Rust palette
      - name: Generate CSS tokens
        run: cd ui-theme && cargo run --example export_css 2>/dev/null > ../docs-site/src/styles/tokens.css

      # 2. Build storybook WASM → docs-site/public/wasm/
      - name: Build storybook WASM
        run: cd ui-storybook && trunk build --release --public-url /frost-night-egui/wasm/ --dist ../docs-site/public/wasm --filehash false

      # 3. Build demo WASM → docs-site/public/demo/
      - name: Build demo WASM
        run: cd web-demo && trunk build --release --public-url /frost-night-egui/demo/ --dist ../docs-site/public/demo --filehash false

      # 4. Build Astro site (includes wasm + demo from public/)
      - name: Build Astro site
        run: |
          cd docs-site
          npm ci
          npm run build

      # 5. Upload final artifact (Astro output contains everything)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
